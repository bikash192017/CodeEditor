# Server Port
server.port=5000

# MongoDB - The URI must include a database name (e.g., /test)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/test}
spring.data.mongodb.database=test

# JWT
app.jwt.secret=${JWT_SECRET:359b9849a2441bfe3a062ec832c72bb21a1b28d637aef43795133c5ba0881273}
app.jwt.expiration=604800000

# CORS - Allowed origins (comma-separated)
app.cors.allowed-origins=${CLIENT_URLS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178}

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY:}

# Resend Email
app.resend.api-key=${RESEND_API_KEY:}

# Socket.IO port (same as server port for simplicity, but can be different)
app.socketio.port=5001

# File upload limit
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
